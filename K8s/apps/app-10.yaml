apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-10
  namespace: microapps
  labels:
    app: app-10
    type: java-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-10
  template:
    metadata:
      labels:
        app: app-10
    spec:
      serviceAccountName: microapps
      containers:
      - name: app-10
        image: arunxim/app-10:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: app-10
  namespace: microapps
  labels:
    app: app-10
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: app-10
