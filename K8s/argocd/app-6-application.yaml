apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-6
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Arunim08/Test_Invariant.git
    targetRevision: HEAD
    path: K8s/app-6
  destination:
    server: https://kubernetes.default.svc
    namespace: microapps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allow-empty: false
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m