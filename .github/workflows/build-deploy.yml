name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'K8s/**'
      - '.github/workflows/build-deploy.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.2.3) - leave empty for commit SHA'
        required: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: arunxim/springboot-frontend
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags}}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]; then
            VERSION=$(echo ${GITHUB_REF#refs/tags/})
          else
            VERSION="commit-${GITHUB_SHA::8}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Update deployment image tag
        run: |
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          echo "New image: ${NEW_IMAGE}"
          
          # Use Python with environment variable to avoid shell expansion issues
          python3 << EOF
          import re
          import os
          
          new_image = os.environ.get('NEW_IMAGE', '')
          print(f"Replacing image tag with: {new_image}")
          
          with open('K8s/base/deployment.yaml', 'r') as f:
              content = f.read()
          
          # Replace the image line
          updated = re.sub(
              r'image: arunxim/springboot-frontend:[^\s]+',
              f'image: {new_image}',
              content
          )
          
          with open('K8s/base/deployment.yaml', 'w') as f:
              f.write(updated)
          
          print("Updated deployment.yaml successfully")
          EOF
          
          echo "Current image line:"
          grep "image: arunxim" K8s/base/deployment.yaml
        env:
          NEW_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Commit and push deployment update
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if there are changes
          if git diff --quiet K8s/base/deployment.yaml; then
            echo "No changes to deployment, skipping commit"
          else
            echo "Changes detected, committing..."
            git add K8s/base/deployment.yaml
            git commit -m "chore: update deployment image to ${{ steps.version.outputs.version }}"
            git push origin main || echo "Push failed, trying with token..."
          fi

      - name: Create Release (optional)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Docker Image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}`
          draft: false
          prerelease: false
